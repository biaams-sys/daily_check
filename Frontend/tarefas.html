<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Tarefas</title>

    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <header>
        <nav>
            <li><a href="index.html">Home</a></li>
            <li><a href="clima.html">Clima</a></li>
            <li><a href="tarefas.html">Tarefas</a></li>
        </nav>
    </header>

    <main>

        <button class="btn-abrir">
            Cadastrar Tarefa
        </button>

    </main>

    <div class="modal">

        <div class="container">

            <button class="fechar">
                X
            </button>

            <h2>Cadastrar Tarefa</h2>

            <form id="formTarefa">

                <label>Nome</label>
                <input type="text" id="nome" required>

                <label>Data de Início</label>
                <input type="datetime-local" id="dataInicio" required>

                <label>Data de Fim</label>
                <input type="datetime-local" id="dataFim">

                <label>Descrição</label>
                <textarea id="descricao" rows="4" required></textarea>

                <label>Imagem</label>
                <input type="text" id="imagem" placeholder="URL da imagem">

                <button type="submit">
                    Salvar Tarefa
                </button>

            </form>

        </div>

    </div>

    <script src="./tarefas.js"></script>

</body>

</html>
